<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{
  width:100%;height:100%;
  background:#13162A;
  font-family:-apple-system,BlinkMacSystemFont,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow:hidden;
}
.w{
  display:flex;flex-direction:column;
  width:100%;height:100%;
  min-height:0;max-height:140px;
  padding:12px 24px 10px;
}

/* 상단 */
.top{
  font-size:14px;font-weight:700;
  color:#BCC2DE;letter-spacing:0.3px;
  line-height:1;margin-bottom:12px;flex-shrink:0;
}

/* 3칸 */
.mid{display:flex;align-items:center;flex:1;gap:0;}

/* 세로 구분선 — 간격 좁힘 */
.vd{
  width:1px;align-self:stretch;
  background:rgba(255,255,255,0.08);
  flex-shrink:0;
  margin:0 12px; /* 20px → 12px */
}

.col{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:7px;
}

/* ── 공통 플립박스 — 고정 높이, 너비는 칸에 맞게 ── */
.fbox{
  position:relative;
  background:#1A1D2E;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  width:100%;          /* 칸 폭 꽉 채움 */
  height:62px;         /* 고정 높이 통일 */
}
.fbox::after{
  content:'';position:absolute;
  left:0;right:0;top:50%;height:1px;
  background:rgba(0,0,0,0.55);pointer-events:none;
}

/* 숫자 공통 — 크기 통일 */
.fnum{
  font-size:42px;font-weight:800;
  color:#E8ECF8;letter-spacing:-2px;line-height:1;
  font-variant-numeric:tabular-nums;font-feature-settings:"tnum";
  white-space:nowrap;position:relative;z-index:1;
}
.fnum.blue{color:#5B8DEF;}

/* 시계 박스 — 동일 높이 */
.clock-fbox{
  position:relative;
  background:#1A1D2E;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  width:100%;
  height:62px;         /* fbox와 동일 */
  gap:2px;
}
.clock-fbox::after{
  content:'';position:absolute;
  left:0;right:0;top:50%;height:1px;
  background:rgba(0,0,0,0.55);pointer-events:none;
}
.csep{
  font-size:34px;font-weight:300;
  color:#252D48;line-height:1;
  position:relative;z-index:1;
  padding-bottom:2px;
}

/* D-day 상단 블루 바 */
.dday-wrap{
  display:flex;flex-direction:column;align-items:center;gap:0;width:100%;
}
.dbar{
  width:50%;height:3px;
  background:#5B8DEF;border-radius:2px;
  margin-bottom:4px;opacity:0.7;
}

/* 서브 레이블 */
.sub{
  font-size:12px;font-weight:700;
  color:#7A84AA;letter-spacing:0.5px;
  white-space:nowrap;text-align:center;line-height:1;
}
.sub.sun{color:#F87171;}
.sub.sat{color:#5B8DEF;}

/* AM/PM */
.ap-row{display:flex;align-items:center;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:#5B8DEF;animation:bk 1s step-end infinite;}
@keyframes bk{0%,100%{opacity:.9;}50%{opacity:.05;}}
.ap{font-size:11px;font-weight:700;letter-spacing:1.5px;color:#5B8DEF;opacity:.8;}
</style>
</head>
<body>
<div class="w">

  <div class="top" id="top">2026년 6월 2주차</div>

  <div class="mid">

    <!-- 날짜 -->
    <div class="col">
      <div class="fbox" style="min-width:120px">
        <span class="fnum" id="dday">9</span>
      </div>
      <div class="sub" id="ddow">화요일</div>
    </div>

    <div class="vd"></div>

    <!-- 시계 -->
    <div class="col">
      <div class="clock-fbox">
        <span class="fnum" id="hh" style="position:relative;z-index:1">10</span>
        <span class="csep">:</span>
        <span class="fnum" id="mm" style="position:relative;z-index:1">42</span>
        <span class="csep">:</span>
        <span class="fnum" id="ss" style="position:relative;z-index:1">01</span>
      </div>
      <div class="ap-row">
        <div class="dot"></div>
        <span class="ap" id="ap">AM</span>
      </div>
    </div>

    <div class="vd"></div>

    <!-- D-day -->
    <div class="col">
      <div class="dday-wrap">
        <div class="fbox" style="width:100%">
          <span class="fnum blue" id="dn">D-21</span>
        </div>
      </div>
      <div class="sub" id="lb">이번달 마감</div>
    </div>

  </div>
</div>
<script>
var DS=['일','월','화','수','목','금','토'];
var DF=['일요일','월요일','화요일','수요일','목요일','금요일','토요일'];
function pad(n){return('0'+n).slice(-2);}
function me(d){return new Date(d.getFullYear(),d.getMonth()+1,0);}
function mw(d){var f=new Date(d.getFullYear(),d.getMonth(),1).getDay();return Math.ceil((d.getDate()+(f===0?6:f-1))/7);}
function tick(){
  var n=new Date();
  var H=n.getHours(),M=n.getMinutes(),S=n.getSeconds(),dw=n.getDay();
  var y=n.getFullYear(),mo=n.getMonth()+1,d=n.getDate();
  document.getElementById('top').textContent=y+'년 '+mo+'월 '+mw(n)+'주차';
  document.getElementById('dday').textContent=d;
  var de=document.getElementById('ddow');
  de.textContent=DF[dw];
  de.className='sub'+(dw===0?' sun':dw===6?' sat':'');
  var h=H%12||12;
  document.getElementById('hh').textContent=pad(h);
  document.getElementById('mm').textContent=pad(M);
  document.getElementById('ss').textContent=pad(S);
  document.getElementById('ap').textContent=H<12?'AM':'PM';
  var tg=me(n),df=Math.round((tg-new Date(y,n.getMonth(),d))/86400000);
  var ne=document.getElementById('dn');
  ne.textContent=df>0?'D-'+df:df===0?'D-Day':'+'+-df;
  document.getElementById('lb').textContent='이번달 마감';
}
tick();setInterval(tick,1000);
</script>
</body>
</html>
